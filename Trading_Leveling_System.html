<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Leveling System</title>
  <style>
    :root {
      --bg: #060b1f;
      --panel: #0d1738;
      --card: #101f49;
      --neon: #4dd8ff;
      --gold: #f9d66e;
      --ok: #6ce98c;
      --danger: #ff6b8a;
      --text: #e8f1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #11245f 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1.2rem; }
    .title { font-weight: 800; letter-spacing: .06em; color: var(--gold); text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 1rem; }
    .card {
      background: linear-gradient(180deg, var(--card), #0a1432);
      border: 1px solid rgba(77,216,255,.25);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 0 30px rgba(77,216,255,.08) inset;
    }
    .stats { display:grid; grid-template-columns: repeat(3, 1fr); gap:.6rem; }
    .stat { background: var(--panel); border-radius: 10px; padding:.7rem; border: 1px solid rgba(255,255,255,.08); }
    .stat small { color:#a8c2ff; display:block; }
    .stat strong { font-size:1.1rem; }
    .bar { width:100%; height:14px; border-radius:999px; background:#09112b; border:1px solid rgba(255,255,255,.12); overflow:hidden; margin-top:.5rem; }
    .fill { height:100%; background: linear-gradient(90deg, #4dd8ff, #6ce98c); width:0; transition:.35s; }
    .attr { display:grid; grid-template-columns: repeat(2, 1fr); gap:.5rem; margin-top:.6rem; }
    .quest {
      display:flex; justify-content:space-between; align-items:center; gap:.5rem;
      padding:.55rem .6rem; border-radius:10px; margin:.45rem 0; background:#0d1b42; border:1px solid rgba(255,255,255,.08);
    }
    button {
      background: linear-gradient(120deg, #2f76ff, #35b7ff);
      color:#fff; border:0; border-radius:10px; padding:.48rem .75rem; font-weight:700; cursor:pointer;
    }
    button[disabled] { opacity:.45; cursor:not-allowed; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:.6rem; }
    .pill { padding:.2rem .5rem; border-radius:999px; font-size:.8rem; background:rgba(249,214,110,.16); color:var(--gold); border:1px solid rgba(249,214,110,.4); }
    dialog {
      border:none; border-radius:16px; padding:1.2rem; width:min(400px, 92vw);
      background:#08122f; color:#e9f8ff; box-shadow:0 30px 80px rgba(0,0,0,.6);
    }
    dialog::backdrop { background: rgba(3,7,20,.78); }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2,1fr);} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">⚔️ Trading Leveling System — Solo Mode</h1>
    <div class="grid">
      <section class="card">
        <h2>📊 Status Panel</h2>
        <div class="stats">
          <div class="stat"><small>Nível</small><strong id="level">1</strong></div>
          <div class="stat"><small>Capital</small><strong id="capital">$10</strong></div>
          <div class="stat"><small>Win Rate</small><strong id="wr">0%</strong></div>
          <div class="stat"><small>Wins na Semana</small><strong id="wins">0/5</strong></div>
          <div class="stat"><small>Semanas Completas</small><strong id="weeks">0</strong></div>
          <div class="stat"><small>Mês Atual</small><strong id="month">Maio</strong></div>
        </div>
        <div class="row" style="margin-top:.7rem"><span>EXP</span><span id="expTxt">0 / 100</span></div>
        <div class="bar"><div class="fill" id="expFill"></div></div>

        <h3>💪 Atributos</h3>
        <div class="attr" id="attr"></div>
      </section>

      <section class="card">
        <div class="row"><h2>🎯 Quests Diárias</h2><span class="pill" id="goal">Meta: $2/dia</span></div>
        <div id="quests"></div>
        <p style="color:#9bc2ff">Complete os 5 dias da semana para subir de nível. Cada conclusão rende EXP.</p>
        <button id="reset">Resetar progresso</button>
      </section>
    </div>
  </div>

  <dialog id="levelUp">
    <h2>⬆️ LEVEL UP!</h2>
    <p id="levelUpMsg"></p>
    <button onclick="document.getElementById('levelUp').close()">Continuar</button>
  </dialog>

  <script>
    const STORAGE = "solo_trading_rpg_v1";
    const months = ["Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const baseCapital = 10;

    const defaultState = {
      level: 1,
      exp: 0,
      expToNext: 100,
      winsWeek: 0,
      totalWins: 0,
      totalDays: 0,
      weeksDone: 0,
      attrs: { STR: 1, INT: 1, AGI: 1, VIT: 1 },
      questsDone: [false, false, false, false, false],
    };

    const state = JSON.parse(localStorage.getItem(STORAGE) || "null") || defaultState;

    const $ = (id) => document.getElementById(id);

    function capitalForLevel(level) { return baseCapital * Math.pow(2, level - 1); }
    function goalForLevel(level) { return Math.round(capitalForLevel(level) * 0.2); }
    function currentMonth(level) { return months[Math.min(7, Math.floor((level - 1) / 4))]; }

    function persist(){ localStorage.setItem(STORAGE, JSON.stringify(state)); }

    function gainExp(n){
      state.exp += n;
      while (state.exp >= state.expToNext) {
        state.exp -= state.expToNext;
        state.level += 1;
        state.expToNext = Math.round(state.expToNext * 1.2);
        Object.keys(state.attrs).forEach(k => state.attrs[k] += 1);
        showLevelUp();
      }
    }

    function completeQuest(dayIdx){
      if (state.questsDone[dayIdx]) return;
      state.questsDone[dayIdx] = true;
      state.winsWeek += 1;
      state.totalWins += 1;
      state.totalDays += 1;
      gainExp(20 + state.level * 3);

      if (state.winsWeek >= 5) {
        state.weeksDone += 1;
        state.winsWeek = 0;
        state.questsDone = [false, false, false, false, false];
        gainExp(40);
      }
      persist();
      render();
    }

    function showLevelUp(){
      $("levelUpMsg").textContent = `Você alcançou o nível ${state.level}. Todos os atributos +1!`;
      $("levelUp").showModal();
    }

    function renderQuests(){
      const el = $("quests");
      el.innerHTML = "";
      for (let i=0;i<5;i++) {
        const row = document.createElement("div");
        row.className = "quest";
        const done = state.questsDone[i];
        row.innerHTML = `<div>Dia ${i+1} ${done ? "✅" : "🟦"}</div>`;
        const btn = document.createElement("button");
        btn.textContent = done ? "Concluído" : "Completar";
        btn.disabled = done;
        btn.onclick = () => completeQuest(i);
        row.appendChild(btn);
        el.appendChild(row);
      }
    }

    function renderAttrs(){
      const el = $("attr");
      el.innerHTML = Object.entries(state.attrs).map(([k,v]) =>
        `<div class="stat"><small>${k}</small><strong>${v}</strong></div>`).join("");
    }

    function render(){
      $("level").textContent = state.level;
      $("capital").textContent = `$${capitalForLevel(state.level).toLocaleString("pt-BR")}`;
      const wr = state.totalDays ? Math.round((state.totalWins/state.totalDays)*100) : 0;
      $("wr").textContent = `${wr}%`;
      $("wins").textContent = `${state.winsWeek}/5`;
      $("weeks").textContent = state.weeksDone;
      $("month").textContent = currentMonth(state.level);
      $("goal").textContent = `Meta: $${goalForLevel(state.level)}/dia`;
      $("expTxt").textContent = `${state.exp} / ${state.expToNext}`;
      $("expFill").style.width = `${(state.exp / state.expToNext) * 100}%`;
      renderAttrs();
      renderQuests();
    }

    $("reset").onclick = () => {
      if (!confirm("Tem certeza que deseja apagar o progresso?")) return;
      localStorage.removeItem(STORAGE);
      location.reload();
    };

    render();
  </script>
</body>
</html>
